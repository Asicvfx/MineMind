# Render Blueprint — deploys the Django backend only.
# Database is external (Neon.tech free Postgres) because Render's free tier
# allows only one free database per account.
# Frontend deploys separately on Vercel (see frontend/vercel.json + docs/deploy_guide.md).
#
# How to use:
#  1. Create a free Postgres on https://neon.tech → copy the connection string.
#  2. Push this repo to GitHub.
#  3. https://dashboard.render.com → New → Blueprint → pick this repo.
#  4. Set the secret env vars below (marked sync:false) in the dashboard:
#       DATABASE_URL                — Neon connection string (postgres://…)
#       OPENAI_API_KEY              — sk-proj-…
#       CORS_ALLOWED_ORIGINS        — fill after Vercel deploy
#       FRONTEND_URL                — fill after Vercel deploy
#       GOOGLE_OAUTH_CLIENT_ID      — optional
#  5. Apply. backend/entrypoint.sh runs migrations + seeds before gunicorn.

services:
  - type: web
    name: minemind-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: ".onrender.com"
      # External Neon Postgres — paste the connection string in the Render dashboard.
      - key: DATABASE_URL
        sync: false
      - key: FREE_PRO_FOR_EVERYONE
        value: "True"
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: OPENAI_MODEL_PRO
        value: gpt-4o
      # Frontend domain — set after Vercel deploy.
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
      # Google Sign-In (optional — leave blank to disable that button).
      - key: GOOGLE_OAUTH_CLIENT_ID
        sync: false
      # Stripe (optional during beta — FREE_PRO_FOR_EVERYONE=True makes
      # everyone Pro without Stripe).
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
