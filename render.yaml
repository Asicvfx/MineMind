services:
  - type: web
    name: minemind-backend
    runtime: docker
    rootDir: backend
    plan: free
    healthCheckPath: /api/health/
    preDeployCommand: |
      python manage.py migrate --noinput
      python manage.py seed_achievements
      python manage.py generate_daily --days 7
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DJANGO_ALLOWED_HOSTS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: minemind-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: minemind-redis
          property: connectionString
      - key: CORS_ALLOWED_ORIGINS
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4o-mini
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PRO_PRICE_ID
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: FRONTEND_URL
        sync: false

  - type: web
    name: minemind-frontend
    runtime: node
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: node .output/server/index.mjs
    envVars:
      - key: NUXT_PUBLIC_API_URL
        sync: false
      - key: NUXT_PUBLIC_STRIPE_PUBLIC_KEY
        sync: false

  - type: redis
    name: minemind-redis
    plan: free
    ipAllowList: []

databases:
  - name: minemind-db
    plan: free
    databaseName: minemind
    user: minemind
