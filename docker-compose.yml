services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: minemind
      POSTGRES_PASSWORD: minemind
      POSTGRES_DB: minemind
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minemind"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_achievements &&
             python manage.py generate_daily --days 1 &&
             gunicorn config.wsgi:application --bind 0.0.0.0:8000 --workers 3 --reload"
    environment:
      DJANGO_DEBUG: "True"
      DJANGO_SECRET_KEY: dev-secret-change-me
      DJANGO_ALLOWED_HOSTS: "*"
      DATABASE_URL: postgres://minemind:minemind@db:5432/minemind
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:3000,http://127.0.0.1:3000
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_PRO_PRICE_ID: ${STRIPE_PRO_PRICE_ID:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
